<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>IT-BOBD — Node Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #060b14; font-family: 'Segoe UI', monospace; overflow: hidden; }
canvas { display: block; }
#tooltip {
  position: fixed; background: rgba(8,15,30,0.95);
  border: 1px solid #1e3a5f; border-radius: 6px;
  padding: 10px 14px; font-size: 12px; line-height: 1.6;
  pointer-events: none; display: none; z-index: 100; max-width: 220px;
  box-shadow: 0 0 20px rgba(0,80,200,0.3);
}
#hud {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 14px 20px; display: flex; align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, rgba(6,11,20,0.9) 0%, transparent 100%);
  pointer-events: none;
}
#title-block h1 { font-size: 22px; color: #e8f0ff; font-weight: 700; letter-spacing: 2px; }
#title-block p { font-size: 11px; color: #4a6a9a; margin-top: 2px; letter-spacing: 1px; }
#stats { display: flex; gap: 20px; }
.stat { text-align: center; }
.stat .n { font-size: 20px; font-weight: bold; }
.stat .l { font-size: 10px; color: #4a6a9a; letter-spacing: 1px; }
#legend {
  position: fixed; bottom: 20px; left: 20px;
  background: rgba(8,15,30,0.85); border: 1px solid #1e3a5f;
  border-radius: 8px; padding: 12px 16px; pointer-events: none;
}
#legend h3 { font-size: 9px; color: #2a4a6a; letter-spacing: 2px; margin-bottom: 8px; }
.li { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #7a8aa0; margin: 5px 0; }
.ld { width: 28px; height: 14px; border-radius: 3px; }
#controls {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; flex-direction: column; gap: 6px;
}
.btn {
  background: rgba(8,15,30,0.85); border: 1px solid #1e3a5f;
  color: #4a7aaa; padding: 7px 14px; border-radius: 6px;
  cursor: pointer; font-size: 11px; letter-spacing: 1px;
  transition: all 0.2s; pointer-events: all;
}
.btn:hover { border-color: #4a7aaa; color: #aacff0; }
#phase-label {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; display: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="title-block">
    <h1>IT-BOBD</h1>
    <p>ROBOT COMPAGNON VOITURE — GRAPHE DE DÉPENDANCES</p>
  </div>
  <div id="stats">
    <div class="stat"><div class="n" style="color:#00cc66">14</div><div class="l">COMPLÉTÉS</div></div>
    <div class="stat"><div class="n" style="color:#ff9944">4</div><div class="l">EN COURS</div></div>
    <div class="stat"><div class="n" style="color:#3a5a7a">11</div><div class="l">À FAIRE</div></div>
    <div class="stat"><div class="n" style="color:#8899bb">7</div><div class="l">PHASES</div></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="legend">
  <h3>LÉGENDE</h3>
  <div class="li"><div class="ld" style="background:#0a1f12;border:1.5px solid #00aa55"></div>Complété ✓</div>
  <div class="li"><div class="ld" style="background:#1f0e00;border:1.5px solid #dd6600"></div>En cours ◎</div>
  <div class="li"><div class="ld" style="background:#0d1220;border:1.5px solid #2a3a5a"></div>À faire ○</div>
  <div class="li"><div class="ld" style="background:#0d1f3a;border:1.5px solid #3a6aaa"></div>Hub central</div>
</div>

<div id="controls">
  <button class="btn" onclick="autoFit()">⊞ RESET VUE</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H, scale = 1, offsetX = 0, offsetY = 0;
let dragging = false, lastX = 0, lastY = 0;
let t = 0;
const VW = 1380, VH = 820;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  autoFit();
}
window.addEventListener('resize', resize);

function autoFit() {
  scale = Math.min((W - 80) / VW, (H - 80) / VH) * 0.95;
  offsetX = 0; offsetY = 0;
}

// ── NODES ──────────────────────────────────────────────────────────────────
const nodes = [
  // Core Hub
  { id:"itbobd",      label:["🤖 IT-BOBD"],            group:0, status:"core",   x:90,  y:400, w:100, h:48, desc:"Robot Compagnon Voiture\nESP32-S3 Zero + OBD2\nHoucemedinne — 2026" },

  // Phase 1 — Hardware Init (Jan 2026)
  { id:"phase1",      label:["PHASE 1","Hardware"],     group:1, status:"done",   x:240, y:175, w:100, h:48, desc:"Janvier 2026\nSetup initial Raspberry Pi" },
  { id:"elm327",      label:["ELM327","Setup"],         group:1, status:"done",   x:370, y:100, w:88,  h:40, desc:"Jan 2026\nPIC18F25K80\nCompatibilité commandes AT" },
  { id:"vw_shake",    label:["VW Handshake"],           group:1, status:"done",   x:500, y:80,  w:108, h:36, desc:"15 Jan 2026 🎉\nAT SH 81 10 F1\nBreakthrough protocole VW" },
  { id:"rpm_ok",      label:["RPM Stable"],             group:1, status:"done",   x:635, y:98,  w:88,  h:36, desc:"16 Jan 2026 ✅\nPremière lecture OBD stable\nPID 010C" },
  { id:"lcd_dash",    label:["Dashboard","LCD"],        group:1, status:"done",   x:395, y:200, w:90,  h:42, desc:"20 Jan 2026\nPython PIL\n240×240 px arcs dynamiques" },
  { id:"coach",       label:["Coach Trip","AI"],        group:1, status:"done",   x:530, y:195, w:92,  h:42, desc:"24 Jan 2026\nNote conduite 0-10\nAnalyse charge moteur" },
  { id:"tactile",     label:["Tactile","0.15s"],        group:1, status:"done",   x:335, y:305, w:82,  h:42, desc:"26 Jan 2026 ⚡\nTTP223 touch sensor\nDélai réduit à 0.15s" },
  { id:"zerodrain",   label:["Zero Drain","AT LP"],     group:1, status:"done",   x:455, y:300, w:90,  h:42, desc:"28 Jan 2026 🔋\nCommande AT LP\nProtège batterie Polo 9N" },
  { id:"esp32c3",     label:["ESP32-C3","Migration"],   group:1, status:"done",   x:578, y:295, w:96,  h:42, desc:"29 Jan 2026 🔄\nKit reçu de Tunis\nCâble CAT6 — 0 Bluetooth" },

  // Phase 2 — Visual (Fév 2026)
  { id:"phase2",      label:["PHASE 2","Visuelle"],     group:2, status:"done",   x:240, y:600, w:100, h:48, desc:"Février 2026\nIntégration expressions visuelles" },
  { id:"yeux",        label:["Yeux","Animations"],      group:2, status:"done",   x:370, y:485, w:90,  h:42, desc:"18 Fév 2026 🎭\nNORMAL/TIRED/ANGRY/HAPPY\nCliignement 5s démarrage" },
  { id:"obd_eyes",    label:["OBD+Yeux","Interface"],   group:2, status:"done",   x:500, y:470, w:96,  h:42, desc:"20 Fév 2026 🖥️\nRPM+SPD+TEMP live\nArcs dynamiques + expressions" },
  { id:"openclaw",    label:["OpenClaw","Intégré"],     group:2, status:"done",   x:370, y:585, w:90,  h:42, desc:"23 Fév 2026 🤖\nAssistant Maxi\nGLM-4.7 + Gemini" },
  { id:"wokwi",       label:["Wokwi","Simulation"],     group:2, status:"done",   x:495, y:570, w:90,  h:42, desc:"26 Fév 2026 🔄\nESP32-S3 Zero + GC9A01\ndiagram.json + platformio" },
  { id:"rapport",     label:["Rapport","HTML"],         group:2, status:"done",   x:618, y:555, w:90,  h:42, desc:"26 Fév 2026 📊\nGitHub Pages\nhoucembot.github.io/it-bobd/" },

  // Phase 3 — ESP32-S3 Hardware (Mars 2026 — en cours)
  { id:"phase3",      label:["PHASE 3","ESP32-S3"],     group:3, status:"active", x:720, y:220, w:100, h:48, desc:"Mars–Mai 2026 ⚙️\nMigration hardware finale\nESP32-S3 Zero + CAN bus" },
  { id:"canbus",      label:["CAN Bus","MCP2515"],      group:3, status:"active", x:845, y:155, w:92,  h:42, desc:"En cours 🔧\nMCP2515 + SN65HVD230\nStabilisation lecture" },
  { id:"gc9a01",      label:["GC9A01","TFT Round"],     group:3, status:"active", x:845, y:258, w:92,  h:42, desc:"En cours 🖥️\n1.28\" écran rond SPI\nExpressions yeux finales" },
  { id:"pids_obd",    label:["PIDs OBD2"],              group:3, status:"active", x:965, y:198, w:90,  h:36, desc:"En cours 📋\n010C RPM / 010D SPD\n0105 TEMP / ATRV Batterie" },
  { id:"github_pub",  label:["GitHub","Public"],        group:3, status:"active", x:720, y:355, w:85,  h:42, desc:"En cours 📁\nREADME + Licence\nCLAUDE.md + docs" },

  // Phase 4 — Audio
  { id:"phase4",      label:["PHASE 4","Audio"],        group:4, status:"future", x:1000,y:115, w:95,  h:48, desc:"Futur 🎵\nSon + Voix\nAssistant parlant" },
  { id:"max98357",    label:["MAX98357A","Speaker"],     group:4, status:"future", x:1110,y:72,  w:98,  h:42, desc:"À faire\nOutput audio I2S\nSynthèse vocale" },
  { id:"inmp441",     label:["INMP441","Microphone"],   group:4, status:"future", x:1110,y:162, w:98,  h:42, desc:"À faire\nInput voix I2S\nReconnaissance commandes" },
  { id:"voice",       label:["Assistant","Vocal"],      group:4, status:"future", x:1230,y:115, w:88,  h:42, desc:"À faire 🗣️\nParle & Écoute\nIA embarquée" },

  // Phase 5 — Miniaturisation
  { id:"phase5",      label:["PHASE 5","Mini HW"],      group:5, status:"future", x:845, y:430, w:95,  h:48, desc:"Futur 🔬\nMiniaturisation hardware\nBoîtier finalisé" },
  { id:"pcb",         label:["PCB Design"],             group:5, status:"future", x:965, y:395, w:90,  h:36, desc:"À faire\nCircuit imprimé custom\nIntégration complète" },
  { id:"battery",     label:["Batterie","Intégrée"],    group:5, status:"future", x:965, y:470, w:90,  h:42, desc:"À faire 🔋\nAutonomie embarquée\nCharge USB" },

  // Phase 6 — Mobile App
  { id:"phase6",      label:["PHASE 6","Mobile App"],   group:6, status:"future", x:1000,y:580, w:100, h:48, desc:"Futur 📱\nInterface mobile\nMonitoring à distance" },
  { id:"app",         label:["App Mobile"],             group:6, status:"future", x:1120,y:545, w:90,  h:36, desc:"À faire\nAndroid / iOS\nDashboard OBD2 live" },
  { id:"alertes",     label:["Alertes &","Diagnostics"],group:6, status:"future", x:1120,y:625, w:100, h:42, desc:"À faire 🔔\nNotifications DTC\nAlertes moteur" },

  // Phase 7 — Commercialisation
  { id:"phase7",      label:["PHASE 7","Commercial"],   group:7, status:"future", x:1270,y:350, w:105, h:48, desc:"2027 🚀\nMise sur marché\nTunisie + Export" },
  { id:"produit",     label:["Produit V1","2027"],       group:7, status:"future", x:1330,y:470, w:95,  h:42, desc:"Objectif final 🏆\nRobot compagnon voiture\nCommercialisation" },
];

const edges = [
  // Core → main phases
  {s:"itbobd",   t:"phase1"},
  {s:"itbobd",   t:"phase2"},
  {s:"itbobd",   t:"phase3"},

  // Phase chain
  {s:"phase3",   t:"phase4"},
  {s:"phase3",   t:"phase5"},
  {s:"phase5",   t:"phase6"},
  {s:"phase4",   t:"phase7"},
  {s:"phase6",   t:"phase7"},
  {s:"phase7",   t:"produit"},

  // Phase 1 internal
  {s:"phase1",   t:"elm327"},
  {s:"elm327",   t:"vw_shake"},
  {s:"vw_shake", t:"rpm_ok"},
  {s:"phase1",   t:"lcd_dash"},
  {s:"rpm_ok",   t:"lcd_dash"},
  {s:"lcd_dash", t:"coach"},
  {s:"phase1",   t:"tactile"},
  {s:"phase1",   t:"zerodrain"},
  {s:"phase1",   t:"esp32c3"},

  // Phase 1 → 3 bridge
  {s:"esp32c3",  t:"phase3"},

  // Phase 2 internal
  {s:"phase2",   t:"yeux"},
  {s:"yeux",     t:"obd_eyes"},
  {s:"lcd_dash", t:"obd_eyes"},
  {s:"phase2",   t:"openclaw"},
  {s:"obd_eyes", t:"wokwi"},
  {s:"phase2",   t:"rapport"},
  {s:"wokwi",    t:"rapport"},

  // Phase 2 → 3 bridge
  {s:"wokwi",    t:"phase3"},

  // Phase 3 internal
  {s:"phase3",   t:"canbus"},
  {s:"phase3",   t:"gc9a01"},
  {s:"canbus",   t:"pids_obd"},
  {s:"phase3",   t:"github_pub"},
  {s:"gc9a01",   t:"phase4"},
  {s:"gc9a01",   t:"phase5"},

  // Phase 4 internal
  {s:"phase4",   t:"max98357"},
  {s:"phase4",   t:"inmp441"},
  {s:"max98357", t:"voice"},
  {s:"inmp441",  t:"voice"},
  {s:"voice",    t:"phase7"},

  // Phase 5 internal
  {s:"phase5",   t:"pcb"},
  {s:"phase5",   t:"battery"},

  // Phase 6 internal
  {s:"phase6",   t:"app"},
  {s:"phase6",   t:"alertes"},

  // Cross-phase
  {s:"pids_obd", t:"phase4"},
  {s:"battery",  t:"phase6"},
];

// Lookup map
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// ── COLORS ─────────────────────────────────────────────────────────────────
const C = {
  core:   {bg:"#0d1f3a", bd:"#4a8fff", tx:"#88bbff", gl:"rgba(50,100,255,0.3)"},
  done:   {bg:"#091a0f", bd:"#008844", tx:"#00cc66", gl:"rgba(0,150,60,0.25)"},
  active: {bg:"#1a0e00", bd:"#cc6600", tx:"#ff9944", gl:"rgba(200,100,0,0.3)"},
  future: {bg:"#0a1020", bd:"#253550", tx:"#4a6080", gl:"rgba(20,40,80,0.1)"},
};
function getC(n) {
  if (n.id.startsWith("phase")) {
    if (n.status==="done")   return {bg:"#091a0f", bd:"#00aa55", tx:"#00ff88", gl:"rgba(0,180,80,0.35)"};
    if (n.status==="active") return {bg:"#1a0e00", bd:"#ff8c00", tx:"#ffaa44", gl:"rgba(220,130,0,0.4)"};
    return {bg:"#0a1020", bd:"#304060", tx:"#5a7090", gl:"rgba(20,40,80,0.15)"};
  }
  return C[n.status] || C.future;
}

// ── DRAW ────────────────────────────────────────────────────────────────────
function worldToScreen(x, y) {
  return {x: (x - VW/2)*scale + W/2 + offsetX, y: (y - VH/2)*scale + H/2 + offsetY};
}
function screenToWorld(sx, sy) {
  return {x: (sx - W/2 - offsetX)/scale + VW/2, y: (sy - H/2 - offsetY)/scale + VH/2};
}

function drawBg() {
  ctx.fillStyle = "#060b14";
  ctx.fillRect(0, 0, W, H);
  // subtle grid
  const gs = 38 * scale;
  const ox = ((offsetX % gs) + W) % gs;
  const oy = ((offsetY % gs) + H) % gs;
  ctx.fillStyle = "rgba(30,55,100,0.2)";
  for (let x = ox - gs; x < W + gs; x += gs)
    for (let y = oy - gs; y < H + gs; y += gs) {
      ctx.beginPath(); ctx.arc(x, y, 1, 0, 6.28); ctx.fill();
    }
}

function drawEdge(e) {
  const a = nodeMap[e.s], b = nodeMap[e.t];
  if (!a || !b) return;
  const A = worldToScreen(a.x, a.y), B = worldToScreen(b.x, b.y);

  let col, alpha;
  if (a.status==="done" && b.status==="done")    { col="#00aa55"; alpha=0.45; }
  else if (a.status==="active" || b.status==="active") { col="#ee7700"; alpha=0.55; }
  else if (a.status==="core"   || b.status==="core")   { col="#4488ee"; alpha=0.6; }
  else { col="#1e3050"; alpha=0.5; }

  const cx1 = A.x + (B.x-A.x)*0.45, cy1 = A.y;
  const cx2 = A.x + (B.x-A.x)*0.55, cy2 = B.y;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.1 * scale;
  ctx.beginPath();
  ctx.moveTo(A.x, A.y);
  ctx.bezierCurveTo(cx1, cy1, cx2, cy2, B.x, B.y);
  ctx.stroke();

  // flowing dot
  if (a.status==="done" || a.status==="active" || a.status==="core") {
    const p = ((t*0.007 + (e.s.charCodeAt(0)+e.t.charCodeAt(0))*0.05) % 1);
    const bt=p;
    const bx = (1-bt)**3*A.x + 3*(1-bt)**2*bt*cx1 + 3*(1-bt)*bt**2*cx2 + bt**3*B.x;
    const by = (1-bt)**3*A.y + 3*(1-bt)**2*bt*cy1 + 3*(1-bt)*bt**2*cy2 + bt**3*B.y;
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 8*scale;
    ctx.beginPath(); ctx.arc(bx, by, 2.5*scale, 0, 6.28); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawNode(n, hovered) {
  const sp = worldToScreen(n.x, n.y);
  const sw = n.w*scale, sh = n.h*scale;
  const r = Math.max(3, 5*scale);
  const x = sp.x - sw/2, y = sp.y - sh/2;
  const c = getC(n);

  ctx.save();

  // glow behind node
  if (n.status !== "future" || hovered) {
    ctx.shadowColor = hovered ? c.tx : (c.gl || c.bd);
    ctx.shadowBlur = hovered ? 22 : (n.status==="active" ? 14 : 10);
  }

  // bg fill
  ctx.fillStyle = c.bg;
  ctx.beginPath(); ctx.roundRect(x, y, sw, sh, r); ctx.fill();

  // border
  ctx.strokeStyle = hovered ? c.tx : c.bd;
  ctx.lineWidth = (n.id.startsWith("phase") || n.group===0) ? 2*scale : 1.5*scale;
  ctx.beginPath(); ctx.roundRect(x, y, sw, sh, r); ctx.stroke();
  ctx.shadowBlur = 0;

  // label
  ctx.fillStyle = c.tx;
  const fs = (n.group===0 ? 13 : n.id.startsWith("phase") ? 10.5 : 9.5) * scale;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  if (n.label.length === 1) {
    ctx.font = `600 ${fs}px 'Segoe UI', monospace`;
    ctx.fillText(n.label[0], sp.x, sp.y);
  } else {
    const lh = fs * 1.35;
    ctx.font = `600 ${fs}px 'Segoe UI', monospace`;
    ctx.fillText(n.label[0], sp.x, sp.y - lh/2);
    ctx.font = `400 ${fs*0.88}px 'Segoe UI', monospace`;
    ctx.globalAlpha = 0.75;
    ctx.fillText(n.label[1], sp.x, sp.y + lh/2);
    ctx.globalAlpha = 1;
  }

  // pulse dot on active nodes
  if (n.status === "active") {
    const pulse = (Math.sin(t*0.06)*0.5+0.5);
    ctx.fillStyle = `rgba(255,140,0,${0.5+pulse*0.5})`;
    ctx.shadowColor = "#ff8c00"; ctx.shadowBlur = 8*scale;
    ctx.beginPath();
    ctx.arc(sp.x + sw/2 - 7*scale, sp.y - sh/2 + 7*scale, 3.5*scale, 0, 6.28);
    ctx.fill(); ctx.shadowBlur = 0;
  }
  if (n.status === "done") {
    ctx.fillStyle = "#00cc66"; ctx.font = `${9*scale}px monospace`;
    ctx.fillText("✓", sp.x + sw/2 - 7*scale, sp.y - sh/2 + 7*scale);
  }

  ctx.restore();
}

// ── INTERACTION ─────────────────────────────────────────────────────────────
let hoveredNode = null;
function getNodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  for (let i = nodes.length-1; i >= 0; i--) {
    const n = nodes[i];
    if (Math.abs(w.x-n.x) < n.w/2+4 && Math.abs(w.y-n.y) < n.h/2+4) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    offsetX += e.clientX-lastX; offsetY += e.clientY-lastY;
    lastX = e.clientX; lastY = e.clientY; return;
  }
  const n = getNodeAt(e.clientX, e.clientY);
  hoveredNode = n;
  if (n) {
    canvas.style.cursor = 'pointer';
    const statusLabel = {done:"✅ Complété", active:"🔄 En cours", future:"○ À faire", core:"⚙️ Hub"}[n.status];
    const groupLabel = ["Hub","Phase 1","Phase 2","Phase 3","Phase 4","Phase 5","Phase 6","Phase 7"][n.group];
    tooltip.innerHTML =
      `<b style="color:#ddeeff">${n.label.join(' ')}</b><br>` +
      `<span style="color:#4a8a6a;font-size:10px">${statusLabel} · ${groupLabel}</span><br>` +
      n.desc.split('\n').map(l=>`<span style="color:#8899bb">${l}</span>`).join('<br>');
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX+16)+'px';
    tooltip.style.top  = Math.min(e.clientY-10, H-160)+'px';
  } else {
    canvas.style.cursor = 'grab';
    tooltip.style.display = 'none';
  }
});
canvas.addEventListener('mousedown', e => { dragging=true; lastX=e.clientX; lastY=e.clientY; canvas.style.cursor='grabbing'; });
canvas.addEventListener('mouseup',   () => { dragging=false; canvas.style.cursor='grab'; });
canvas.addEventListener('mouseleave',() => { dragging=false; tooltip.style.display='none'; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY>0 ? 0.9 : 1.1;
  const wx=(e.clientX-W/2-offsetX)/scale, wy=(e.clientY-H/2-offsetY)/scale;
  scale = Math.max(0.25, Math.min(4, scale*f));
  offsetX = e.clientX-W/2-wx*scale;
  offsetY = e.clientY-H/2-wy*scale;
}, {passive:false});

// Touch support
let lastDist = 0;
canvas.addEventListener('touchmove', e => {
  if (e.touches.length===2) {
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if (lastDist) scale=Math.max(0.25,Math.min(4,scale*(d/lastDist)));
    lastDist=d;
  } else if (e.touches.length===1 && dragging) {
    offsetX+=e.touches[0].clientX-lastX; offsetY+=e.touches[0].clientY-lastY;
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchstart', e => { dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; lastDist=0; });
canvas.addEventListener('touchend',   () => { dragging=false; lastDist=0; });

// ── RENDER LOOP ─────────────────────────────────────────────────────────────
function render() {
  t++;
  drawBg();
  edges.forEach(e => drawEdge(e));
  nodes.forEach(n => drawNode(n, n===hoveredNode));
  requestAnimationFrame(render);
}

resize();
render();
</script>
</body>
</html>
