function phaseC(status) {
  if (status==="done")   return {bg:"#091a0f", bd:"#00aa55", tx:"#00ff88", gl:"rgba(0,180,80,0.38)"};
  if (status==="active") return {bg:"#1a0d00", bd:"#ff8c00", tx:"#ffaa44", gl:"rgba(220,130,0,0.42)"};
  return {bg:"#0a1020", bd:"#2a3d58", tx:"#507090", gl:"rgba(15,30,60,0.15)"};
}
function getC(n) { return n.id.startsWith("phase") ? phaseC(n.status) : (C[n.status]||C.future); }

// ── TRANSFORMS ─────────────────────────────────────────────────────────────
function w2s(x,y) { return {x:(x-VW/2)*scale+W/2+offsetX, y:(y-VH/2)*scale+H/2+offsetY}; }
function s2w(sx,sy){ return {x:(sx-W/2-offsetX)/scale+VW/2, y:(sy-H/2-offsetY)/scale+VH/2}; }

function getNodeMap() {
  const m={}; nodes.forEach(n=>m[n.id]=n); return m;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle="#060b14"; ctx.fillRect(0,0,W,H);
  const gs=40*scale;
  const ox=((offsetX%gs)+W)%gs, oy=((offsetY%gs)+H)%gs;
  ctx.fillStyle="rgba(25,50,100,0.18)";
  for(let x=ox-gs;x<W+gs;x+=gs)
    for(let y=oy-gs;y<H+gs;y+=gs){
      ctx.beginPath();ctx.arc(x,y,1,0,6.28);ctx.fill();
    }
}

function drawEdge(e, nm) {
  const a=nm[e.s], b=nm[e.t]; if(!a||!b) return;
  const A=w2s(a.x,a.y), B=w2s(b.x,b.y);
  let col,alpha;
  const as=a.status, bs=b.status;
  if(as==="doc"||bs==="doc") { col="#2a3a80"; alpha=0.5; }
  else if(as==="done"&&bs==="done") { col="#007a3d"; alpha=0.45; }
  else if(as==="active"||bs==="active") { col="#dd6a00"; alpha=0.55; }
  else if(as==="core"||bs==="core") { col="#3a7aee"; alpha=0.65; }
  else { col="#1a2c42"; alpha=0.45; }
  const cx1=A.x+(B.x-A.x)*0.45, cy1=A.y, cx2=A.x+(B.x-A.x)*0.55, cy2=B.y;
  ctx.save();
  ctx.globalAlpha=alpha; ctx.strokeStyle=col; ctx.lineWidth=1.15*scale;
  ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.bezierCurveTo(cx1,cy1,cx2,cy2,B.x,B.y); ctx.stroke();
  // flowing dot
  if(as!=="future") {
    const key = e.s.charCodeAt(0)*7 + e.t.charCodeAt(0)*3;
    const p=((t*0.006+key*0.04)%1), bt=p;
    const bx=(1-bt)**3*A.x+3*(1-bt)**2*bt*cx1+3*(1-bt)*bt**2*cx2+bt**3*B.x;
    const by=(1-bt)**3*A.y+3*(1-bt)**2*bt*cy1+3*(1-bt)*bt**2*cy2+bt**3*B.y;
    ctx.globalAlpha=0.85; ctx.fillStyle=col;
    ctx.shadowColor=col; ctx.shadowBlur=7*scale;
    ctx.beginPath(); ctx.arc(bx,by,2.3*scale,0,6.28); ctx.fill(); ctx.shadowBlur=0;
  }
  ctx.restore();
}

function drawNode(n, hov) {
  const sp=w2s(n.x,n.y), sw=n.w*scale, sh=n.h*scale;
  const r=Math.max(3,5*scale), x=sp.x-sw/2, y=sp.y-sh/2, c=getC(n);
  ctx.save();
  if(n.status!=="future"||hov) { ctx.shadowColor=hov?c.tx:(c.gl||c.bd); ctx.shadowBlur=hov?22:(n.status==="active"?16:10); }
  ctx.fillStyle=c.bg; ctx.beginPath(); ctx.roundRect(x,y,sw,sh,r); ctx.fill();
  ctx.strokeStyle=hov?c.tx:c.bd; ctx.lineWidth=(n.id.startsWith("phase")||n.group===0)?2*scale:1.5*scale;
  ctx.beginPath(); ctx.roundRect(x,y,sw,sh,r); ctx.stroke(); ctx.shadowBlur=0;
  // text
  ctx.fillStyle=c.tx; ctx.textAlign="center"; ctx.textBaseline="middle";
  const fs=(n.group===0?13:n.id.startsWith("phase")?10.5:9.5)*scale;
  if(n.label.length===1) {
    ctx.font=`600 ${fs}px 'Segoe UI',monospace`; ctx.fillText(n.label[0],sp.x,sp.y);
  } else {
    const lh=fs*1.35;
    ctx.font=`600 ${fs}px 'Segoe UI',monospace`; ctx.fillText(n.label[0],sp.x,sp.y-lh/2);
    ctx.font=`400 ${fs*0.88}px 'Segoe UI',monospace`; ctx.globalAlpha=0.75;
    ctx.fillText(n.label[1],sp.x,sp.y+lh/2); ctx.globalAlpha=1;
  }
  // indicators
  if(n.status==="active") {
    const p=Math.sin(t*0.06)*0.5+0.5;
    ctx.fillStyle=`rgba(255,140,0,${0.5+p*0.5})`; ctx.shadowColor="#ff8c00"; ctx.shadowBlur=8*scale;
    ctx.beginPath(); ctx.arc(sp.x+sw/2-7*scale,sp.y-sh/2+7*scale,3.5*scale,0,6.28); ctx.fill(); ctx.shadowBlur=0;
  }
  if(n.status==="done") {
    ctx.fillStyle="#00cc66"; ctx.font=`${8.5*scale}px monospace`;
    ctx.globalAlpha=0.8; ctx.fillText("✓",sp.x+sw/2-7*scale,sp.y-sh/2+7*scale); ctx.globalAlpha=1;
  }
  if(n.url) {
    ctx.fillStyle=c.tx; ctx.font=`${8*scale}px monospace`;
    ctx.globalAlpha=hov?1:0.6; ctx.fillText("↗",sp.x-sw/2+8*scale,sp.y-sh/2+8*scale); ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ── INTERACTION ─────────────────────────────────────────────────────────────
let hoveredNode=null, dragNode=null, panDragging=false;
let mouseDownX=0, mouseDownY=0, hasDragged=false;
let lastX=0, lastY=0;
let clickTimer=null, editNode=null;

function getNodeAt(sx,sy) {
  const w=s2w(sx,sy);
  for(let i=nodes.length-1;i>=0;i--) {
    const n=nodes[i];
    if(Math.abs(w.x-n.x)<n.w/2+4 && Math.abs(w.y-n.y)<n.h/2+4) return n;
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const dx=e.clientX-mouseDownX, dy=e.clientY-mouseDownY;
  if(dragNode) {
    if(Math.abs(dx)>4||Math.abs(dy)>4) {
      hasDragged=true;
      dragNode.x+=(e.clientX-lastX)/scale;
      dragNode.y+=(e.clientY-lastY)/scale;
    }
  } else if(panDragging) {
    offsetX+=e.clientX-lastX; offsetY+=e.clientY-lastY;
  }
  lastX=e.clientX; lastY=e.clientY;
  hoveredNode=getNodeAt(e.clientX,e.clientY);
  if(hoveredNode) {
    canvas.style.cursor=hoveredNode.url&&!dragNode?'pointer':'move';
    const c=getC(hoveredNode);
    const sLabel={done:"✅ Complété",active:"🔄 En cours",future:"○ À faire",doc:"📄 Document HTML",core:"⚙️ Hub"}[hoveredNode.status];
    const gLabel=["Hub","Phase 1","Phase 2","Phase 3","Phase 4","Phase 5","Phase 6","Phase 7","Documents"][hoveredNode.group]||"";
    tooltip.innerHTML=
      `<b style="color:#ddeeff">${hoveredNode.label.join(' ')}</b><br>`+
      `<span style="color:#3a6a4a;font-size:10px">${sLabel} · ${gLabel}</span><br>`+
      hoveredNode.desc.split('\n').map(l=>`<span style="color:#7788aa">${l}</span>`).join('<br>')+
      (hoveredNode.url?`<br><span style="color:#5577bb;font-size:10px">↗ ${hoveredNode.url}</span>`:'');
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+16)+'px';
    tooltip.style.top=Math.min(e.clientY-10,H-200)+'px';
  } else {
    canvas.style.cursor=panDragging?'grabbing':'grab';
    tooltip.style.display='none';
  }
});

canvas.addEventListener('mousedown', e => {
  mouseDownX=e.clientX; mouseDownY=e.clientY; hasDragged=false;
  lastX=e.clientX; lastY=e.clientY;
  const n=getNodeAt(e.clientX,e.clientY);
  if(n) { dragNode=n; canvas.style.cursor='move'; }
  else  { panDragging=true; canvas.style.cursor='grabbing'; }
});

canvas.addEventListener('mouseup', e => {
  if(dragNode && !hasDragged) {
    const n=dragNode;
    if(clickTimer) {
      clearTimeout(clickTimer); clickTimer=null;
      openEdit(n);
    } else {
      clickTimer=setTimeout(()=>{
        clickTimer=null;
        if(n.url) window.open(BASE+n.url,'_blank');
      },240);
    }
  }
  if(dragNode && hasDragged) savePositions();
  dragNode=null; panDragging=false;
  canvas.style.cursor='grab';
});

canvas.addEventListener('mouseleave',()=>{
  dragNode=null; panDragging=false; tooltip.style.display='none';
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.9:1.1;
  const wx=(e.clientX-W/2-offsetX)/scale, wy=(e.clientY-H/2-offsetY)/scale;
  scale=Math.max(0.2,Math.min(4,scale*f));
  offsetX=e.clientX-W/2-wx*scale; offsetY=e.clientY-H/2-wy*scale;
},{passive:false});

// Touch
let lastTouchDist=0, lastTouchX=0, lastTouchY=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){lastTouchX=e.touches[0].clientX;lastTouchY=e.touches[0].clientY;panDragging=true;}
  lastTouchDist=0; e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(lastTouchDist) scale=Math.max(0.2,Math.min(4,scale*(d/lastTouchDist)));
    lastTouchDist=d;
  } else if(e.touches.length===1){
    offsetX+=e.touches[0].clientX-lastTouchX; offsetY+=e.touches[0].clientY-lastTouchY;
    lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{panDragging=false;lastTouchDist=0;});

// ── EDIT PANEL ──────────────────────────────────────────────────────────────
function openEdit(n) {
  editNode=n;
  document.getElementById('e-l1').value=n.label[0]||'';
  document.getElementById('e-l2').value=n.label[1]||'';
  document.getElementById('e-status').value=n.status;
  document.getElementById('e-url').value=n.url||'';
  document.getElementById('e-desc').value=n.desc||'';
  document.getElementById('edit-panel').style.display='block';
  document.getElementById('overlay').style.display='block';
}
function closeEdit() {
  document.getElementById('edit-panel').style.display='none';
  document.getElementById('overlay').style.display='none';
  editNode=null;
}
function saveEdit() {
  if(!editNode) return;
  const l1=document.getElementById('e-l1').value.trim();
  const l2=document.getElementById('e-l2').value.trim();
  editNode.label=l2?[l1,l2]:[l1];
  editNode.status=document.getElementById('e-status').value;
  editNode.url=document.getElementById('e-url').value.trim()||null;
  editNode.desc=document.getElementById('e-desc').value.trim();
  updateStats(); savePositions(); closeEdit();
}
function deleteNode() {
  if(!editNode) return;
  if(!confirm(`Supprimer le nœud "${editNode.label[0]}" ?`)) return;
  nodes=nodes.filter(n=>n!==editNode);
  edges=edges.filter(e=>e.s!==editNode.id&&e.t!==editNode.id);
  updateStats(); savePositions(); closeEdit();
}

// ── ADD NODE ────────────────────────────────────────────────────────────────
function addNode() {
  const n={
    id:'node_'+Date.now(), label:['Nouveau','Nœud'],
    group:8, status:'future', x:VW/2, y:VH/2, w:100, h:42,
    url:null, desc:'Double-clic pour éditer'
  };
  nodes.push(n); openEdit(n);
}

// ── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-done').textContent=nodes.filter(n=>n.status==='done').length;
  document.getElementById('s-active').textContent=nodes.filter(n=>n.status==='active').length;
  document.getElementById('s-future').textContent=nodes.filter(n=>n.status==='future').length;
  document.getElementById('s-doc').textContent=nodes.filter(n=>n.status==='doc').length;
}

// ── SAVE/LOAD POSITIONS (localStorage) ──────────────────────────────────────
function savePositions() {
  const pos={};
  nodes.forEach(n=>{ pos[n.id]={x:n.x,y:n.y,label:n.label,status:n.status,url:n.url,desc:n.desc}; });
  try { localStorage.setItem('itbobd_graph_v2',JSON.stringify(pos)); } catch(e){}
}
function loadPositions() {
  try {
    const saved=localStorage.getItem('itbobd_graph_v2');
    if(!saved) return;
    const pos=JSON.parse(saved);
    nodes.forEach(n=>{ if(pos[n.id]){ Object.assign(n,pos[n.id]); } });
  } catch(e){}
}

// ── RENDER LOOP ─────────────────────────────────────────────────────────────
function render() {
  t++;
  drawBg();
  const nm=getNodeMap();
  edges.forEach(e=>drawEdge(e,nm));
  nodes.forEach(n=>drawNode(n,n===hoveredNode));
  requestAnimationFrame(render);
}

loadPositions();
updateStats();
resize();
autoFit();
render();
</script>
