<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e1e2e 0%, #313244 100%); color: white; font-family: 'Inter', sans-serif; }
        .roadmap-svg { max-width: 100%; height: auto; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .node { cursor: pointer; transition: all 0.3s ease; rx: 12; ry: 12; }
        .node:hover { filter: drop-shadow(0 10px 20px rgba(0,255,136,0.5)); transform: scale(1.05); }
        .done { fill: #10b981; stroke: #059669; stroke-width: 3; }
        .in-progress { fill: #f59e0b; stroke: #d97706; stroke-width: 3; }
        .todo { fill: #ef4444; stroke: #dc2626; stroke-width: 3; opacity: 0.8; }
        .path { stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .path.done { stroke: #10b981; }
        .path.in-progress { stroke: #f59e0b; stroke-dasharray: 10,5; animation: dash 1.5s linear infinite; }
        .path.todo { stroke: #6b7280; stroke-opacity: 0.5; }
        @keyframes dash { to { stroke-dashoffset: -15; } }
        .legend { display: flex; justify-content: center; gap: 32px; margin-top: 24px; }
        .legend-item { display: flex; items-center; gap: 8px; font-size: 14px; }
        .legend-swatch { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
